services:
  - type: web
    name: finance-app
    env: static
    buildCommand: cd client && npm install && npm run build
    staticPublicPath: client/dist
    routes:
      - path: /*
        destination: /index.html
    headers:
      - path: /*
        name: Cache-Control
        value: "public, max-age=3600"
      - path: /assets/*
        name: Cache-Control
        value: "public, max-age=31536000, immutable"
    envvars:
      - key: NODE_ENV
        value: production
